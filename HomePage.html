<html>
  <head>
    <title>SCC class</title>
    <style>
      body {
        background-color: #ffcb05; /* Pokemon yellow */
        color: #2a75bb; /* Pokemon blue */
        font-family: 'Comic Sans MS', cursive, sans-serif;
        text-align: center;
        padding: 20px;
      }
      p {
        font-size: 1.3rem;
        margin: 10px 0;
      }
      span {
        color: #ff0000; /* red highlight */
        font-weight: bold;
        font-size: 1.1rem;
      }
      .pokemon-image {
        margin: 15px;
        border: 3px solid #2a75bb;
        border-radius: 8px;
      }
      .footer {
        margin-top: 30px;
        font-size: 0.9rem;
        color: #2a75bb;
      }
    </style>
  </head>
  <body>
    <p>This is pokemon data page</p>
    <p>Halo trainer</p>
    <span>Gonna catch them all</span>

    <div>
      <img class="pokemon-image" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/001.png" alt="Bulbasaur" width="150" />
      <img class="pokemon-image" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/004.png" alt="Charmander" width="150" />
      <img class="pokemon-image" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/007.png" alt="Squirtle" width="150" />
    </div>

    <p class="footer">Pokémon and Pokémon character names are trademarks of Nintendo.</p>
  </body>
</html>
